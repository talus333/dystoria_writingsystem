<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Dystoria — Expanded Builds & Hairstyles (style E)</title>
<style>
 body{background:#e9e0cc;font-family:Georgia,serif;color:#241f1a;margin:24px}
 h1{font-size:22px;margin:0 0 2px} .sub{font-size:13px;opacity:.7;margin-bottom:14px}
 h2{font-size:16px;margin:26px 0 8px;border-bottom:1px solid #24201a44;padding-bottom:4px}
 .grid{display:flex;flex-wrap:wrap;gap:14px}
 .item{display:flex;flex-direction:column;align-items:center;gap:4px;width:96px}
 .item svg{width:88px;height:120px}
 .lbl{font-size:11px;opacity:.8;text-align:center}
 .new .lbl::after{content:" ✦new";color:#7a4a1e;font-weight:700}

 .chip svg{width:28px;height:38px;display:block}
</style></head><body>
<h1>Expanded builds &amp; hairstyles — rendered in style E</h1>
<div class="sub">Everything below uses the chosen treatment (refined silhouette + carved detail + face). ✦new marks additions.</div>
<div id="out"></div>
<script>
    
    var SB_DK='#241f1a', SB_CR='#efe8d6';
    function sbP(d,f){return '<path d="'+d+'" fill="'+(f||SB_DK)+'"/>';}
    function sbW(d,w){return '<path d="'+d+'" fill="none" stroke="'+SB_CR+'" stroke-width="'+(w||1.3)+'" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"/>';}
    function sbS(d,w){return '<path d="'+d+'" fill="none" stroke="'+SB_DK+'" stroke-width="'+(w||3)+'" stroke-linecap="round"/>';}
    function sbC(cx,cy,r,f){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(f||SB_DK)+'"/>';}
    function sbGl(d,w){return '<path d="'+d+'" fill="none" stroke="'+SB_DK+'" stroke-width="'+(w||1.4)+'" stroke-linecap="round" stroke-linejoin="round"/>';}
    function sbBlend(hex){if(!hex||hex.charAt(0)!=='#'||hex.length<7)return SB_DK;var r=parseInt(hex.substr(1,2),16),g=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16),t=0.42;function mix(c,d){return Math.round(c*t+d*(1-t));}var R=mix(r,36),G=mix(g,31),B=mix(b,26);return '#'+[R,G,B].map(function(v){return ('0'+v.toString(16)).slice(-2);}).join('');}
    var ARCH={

 Martial:function(x,y){return sbGl('M'+(x-3.2)+' '+(y+3.2)+' L'+(x+3.2)+' '+(y-3.2)+' M'+(x+3.2)+' '+(y+3.2)+' L'+(x-3.2)+' '+(y-3.2),1.5);},

 Shadow:function(x,y){return sbP('M'+(x-3.6)+' '+(y-2)+' Q'+x+' '+(y-3.4)+' '+(x+3.6)+' '+(y-2)+' Q'+(x+1.5)+' '+(y+1.4)+' '+x+' '+(y+1.4)+' Q'+(x-1.5)+' '+(y+1.4)+' '+(x-3.6)+' '+(y-2)+' Z',SB_DK)+sbC(x-1.5,y-1.2,0.75,SB_CR)+sbC(x+1.5,y-1.2,0.75,SB_CR);},

roke-linecap=\"round\"/>","Scholar":"<path d=\"M60 74 H72 V89 H60 Z\" fill=\"#241f1a\"/><path d=\"M66 74 V89\" fill=\"none\" stroke=\"#efe8d6\" stroke-width=\"0.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.92\"/>","Soldier":"<path d=\"M66 24 L72 104\" fill=\"none\" stroke=\"#241f1a\" stroke-width=\"3.2\" stroke-linecap=\"round\"/><path d=\"M60 31 H78\" fill=\"none\" stroke=\"#241f1a\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>","Priest":"<path d=\"M70 28 V104\" fill=\"none\" stroke=\"#241f1a\" stroke-width=\"2.8\" stroke-linecap=\"round\"/><path d=\"M70 24 V34 M65 28 H75\" stroke=\"#241f1a\" stroke-width=\"2.6\" stroke-linecap=\"round\"/>"};

      double:'<g opacity="0.32"><circle cx="57" cy="31" r="6.6" fill="'+SB_DK+'"/><path d="M46 44 Q57 42 67 44 L67 100 L46 100 Z" fill="'+SB_DK+'"/></g>'
    };
    /* ===== modular being figures (build/head/hair/appendages) — tables below extend with one line ===== */
function _figEl(cx,cy,rx,ry){return '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+SB_DK+'"/>';}

// ---- easy-to-extend part tables (add a line to add a shape) ----
var FIG_BUILD={  // [shoulder, chest, waist, hip] half-widths
 m:{average:[13,12.5,10.5,11],athletic:[16.5,14.5,8.5,9.5],burly:[18.5,17.5,13,13],lanky:[11,10.5,8,8.5],stocky:[15,14.5,13.5,13.5],round:[12,16.5,17.5,14.5],pear:[10,11,13,16.5],apple:[16,16.5,12,9]},
 f:{classic:[11,12,6,14.5],dramatic:[11,13,4.8,18],voluptuous:[12,14.5,8,17],slim:[8.5,9.5,5.5,11],petite:[9.5,10.5,5.6,12],pear:[9,10,8,17],apple:[12.5,14.5,9,11],round:[12.5,15.5,15.5,16.5]}};
var FIG_HEADSHAPE={round:1,oval:1,square:1,broad:1,narrow:1};
var FIG_HAIR={m:['crop','fringe','afro','long','pony','mohawk','bald'],f:['long','wavy','bun','pony','bob','crop']};

var FIG_HY=30;
function _figHeadShape(s){switch(s){case'oval':return _figEl(50,FIG_HY,6.0,7.6);case'narrow':return _figEl(50,FIG_HY,5.5,7.8);case'broad':return _figEl(50,FIG_HY,7.6,6.6);case'square':return sbP('M44 '+(FIG_HY-6)+' Q44 '+(FIG_HY-7.5)+' 50 '+(FIG_HY-7.5)+' Q56 '+(FIG_HY-7.5)+' 56 '+(FIG_HY-6)+' L56 '+(FIG_HY+5)+' Q56 '+(FIG_HY+7.5)+' 50 '+(FIG_HY+7.5)+' Q44 '+(FIG_HY+7.5)+' 44 '+(FIG_HY+5)+' Z');default:return sbC(50,FIG_HY,6.9);}}
function _figHead(o){if(o.head==='horned')return sbC(50,FIG_HY,6.9)+sbP('M44.5 '+(FIG_HY-5)+' Q40 '+(FIG_HY-13)+' 42 '+(FIG_HY-16)+' Q45 '+(FIG_HY-11)+' 46.5 '+(FIG_HY-7)+' Z')+sbP('M55.5 '+(FIG_HY-5)+' Q60 '+(FIG_HY-13)+' 58 '+(FIG_HY-16)+' Q55 '+(FIG_HY-11)+' 53.5 '+(FIG_HY-7)+' Z');
 if(o.head==='beak')return sbC(50,FIG_HY,6.4)+sbP('M55.5 '+(FIG_HY-1)+' l8 2.4 l-8 2.4 z');
 if(o.head==='beast')return sbP('M43 '+(FIG_HY-5)+' Q43 '+(FIG_HY-8)+' 50 '+(FIG_HY-8)+' Q57 '+(FIG_HY-8)+' 57 '+(FIG_HY-5)+' L58 '+(FIG_HY+3)+' Q58 '+(FIG_HY+8)+' 50 '+(FIG_HY+9)+' Q42 '+(FIG_HY+8)+' 42 '+(FIG_HY+3)+' Z')+sbP('M44 '+(FIG_HY-6)+' Q39 '+(FIG_HY-13)+' 41 '+(FIG_HY-16)+' Q45 '+(FIG_HY-11)+' 46 '+(FIG_HY-7)+' Z')+sbP('M56 '+(FIG_HY-6)+' Q61 '+(FIG_HY-13)+' 59 '+(FIG_HY-16)+' Q55 '+(FIG_HY-11)+' 54 '+(FIG_HY-7)+' Z')+sbC(46,FIG_HY,0.7,SB_CR)+sbC(54,FIG_HY,0.7,SB_CR);
 return _figHeadShape(o.headShape);}
function _figHair(s){var r=7.2,t=FIG_HY;switch(s){
 case'crop':return sbP('M'+(50-r-0.5)+' '+(t+1)+' Q50 '+(t-r-3)+' '+(50+r+0.5)+' '+(t+1)+' Q'+(50+r)+' '+(t-2.5)+' 50 '+(t-r+0.5)+' Q'+(50-r)+' '+(t-2.5)+' '+(50-r-0.5)+' '+(t+1)+' Z');
 case'fringe':return sbP('M'+(50-r-1)+' '+(t+1.5)+' Q50 '+(t-r-4)+' '+(50+r+1)+' '+(t+1.5)+' Q'+(50+r)+' '+(t-1.5)+' '+(50+1)+' '+(t-1.5)+' Q'+(50-2)+' '+(t+1)+' '+(50-r+1)+' '+(t-2.5)+' Q'+(50-r)+' '+(t-1)+' '+(50-r-1)+' '+(t+1.5)+' Z');
 case'afro':return sbP('M'+(50-r-3)+' '+t+' Q'+(50-r-3)+' '+(t-r-3)+' '+(50-3)+' '+(t-r-3)+' Q50 '+(t-r-6)+' '+(50+3)+' '+(t-r-3)+' Q'+(50+r+3)+' '+(t-r-3)+' '+(50+r+3)+' '+t+' Q'+(50+r+3)+' '+(t-r+2)+' '+(50+r-1)+' '+(t-r+1)+' Q50 '+(t-r-2)+' '+(50-r+1)+' '+(t-r+1)+' Q'+(50-r-3)+' '+(t-r+2)+' '+(50-r-3)+' '+t+' Z');
 case'long':return sbP('M'+(50-r-1)+' '+t+' Q50 '+(t-r-4)+' '+(50+r+1)+' '+t+' L'+(50+r+2)+' '+(t+22)+' Q'+(50+r+0.5)+' '+(t+24)+' '+(50+r-2)+' '+(t+22)+' L'+(50+r-2.5)+' '+(t+1)+' Q50 '+(t-2)+' '+(50-r+2.5)+' '+(t+1)+' L'+(50-r+2)+' '+(t+22)+' Q'+(50-r-0.5)+' '+(t+24)+' '+(50-r-2)+' '+(t+22)+' Z');
 case'wavy':return sbP('M'+(50-r-1.5)+' '+t+' Q50 '+(t-r-4)+' '+(50+r+1.5)+' '+t+' Q'+(50+r+3)+' '+(t+8)+' '+(50+r)+' '+(t+16)+' Q'+(50+r+1.5)+' '+(t+10)+' '+(50+r-2.5)+' '+(t+2)+' Q50 '+(t-2)+' '+(50-r+2.5)+' '+(t+2)+' Q'+(50-r-1.5)+' '+(t+10)+' '+(50-r)+' '+(t+16)+' Q'+(50-r-3)+' '+(t+8)+' '+(50-r-1.5)+' '+t+' Z');
 case'pony':return sbP('M'+(50-r-0.5)+' '+(t+1)+' Q50 '+(t-r-3)+' '+(50+r+0.5)+' '+(t+1)+' Q'+(50+r)+' '+(t-2.5)+' 50 '+(t-r+0.5)+' Q'+(50-r)+' '+(t-2.5)+' '+(50-r-0.5)+' '+(t+1)+' Z')+sbP('M'+(50+r-2)+' '+(t-4)+' Q'+(50+r+6)+' '+(t-2)+' '+(50+r+5)+' '+(t+12)+' Q'+(50+r+2)+' '+(t+6)+' '+(50+r-2)+' '+(t+1)+' Z');
 case'bun':return sbP('M'+(50-r-0.5)+' '+(t+1)+' Q50 '+(t-r-2.5)+' '+(50+r+0.5)+' '+(t+1)+' Q'+(50+r)+' '+(t-2.5)+' 50 '+(t-r)+' Q'+(50-r)+' '+(t-2.5)+' '+(50-r-0.5)+' '+(t+1)+' Z')+sbC(50,t-r-3.2,3.4);
 case'bob':return sbP('M'+(50-r-1.5)+' '+t+' Q50 '+(t-r-4)+' '+(50+r+1.5)+' '+t+' L'+(50+r+1.5)+' '+(t+7)+' Q50 '+(t+9)+' '+(50-r-1.5)+' '+(t+7)+' Z');

 default:return '';}}

function _figHalo(){return '<ellipse cx="50" cy="19" rx="8.5" ry="2.3" fill="none" stroke="'+SB_CR+'" stroke-width="1.9"/>';}
function composeFigure(o){o=o||{};var sex=(o.sex==='f')?'f':'m';var b=(FIG_BUILD[sex][o.build])||FIG_BUILD[sex][Object.keys(FIG_BUILD[sex])[0]];
 var s='';if(o.wings==='feather')s+=_figWingF(-1)+_figWingF(1);else if(o.wings==='bat')s+=_figWingB(-1)+_figWingB(1);
 // body
 var sh=b[0],ch=b[1],wa=b[2],hi=b[3];
 s+=sbP('M47 '+(FIG_HY+5.5)+' h6 v4 h-6 z'); // neck
 s+=sbP('M'+(50-sh)+' 44 Q50 41 '+(50+sh)+' 44 Q'+(50+ch)+' 50 '+(50+ch)+' 57 Q'+(50+wa)+' 64 '+(50+wa)+' 70 Q'+(50+hi)+' 78 '+(50+hi)+' 86 L'+(50+hi)+' 104 L50 104 L'+(50-hi)+' 104 L'+(50-hi)+' 86 Q'+(50-wa)+' 78 '+(50-wa)+' 70 Q'+(50-ch)+' 64 '+(50-ch)+' 57 Q'+(50-sh)+' 50 '+(50-sh)+' 44 Z');
 s+=sbW('M50 70 V101');s+=sbW('M'+(50-Math.min(ch,sh)+1)+' '+(sex==='f'?51:50)+' Q50 '+(sex==='f'?55:54)+' '+(50+Math.min(ch,sh)-1)+' '+(sex==='f'?51:50),1.1);s+=sbW('M'+(50-wa)+' 70 Q50 72 '+(50+wa)+' 70',1.0);
 if(o.arms)s+=_figArms(b);if(o.tail)s+=_figTail();
 s+=_figHead(o);if(o.antennae)s+=_figAnt();if(o.hair&&o.head!=='beast'&&!(o.occupation&&typeof HAT!=='undefined'&&HAT[o.occupation]))s+=_figHair(o.hair);if(o.halo)s+=_figHalo();
 if(o.occupation&&typeof HAT!=='undefined'&&HAT[o.occupation]&&!o.mark)s+=HAT[o.occupation];
 if(o.archetype&&typeof ARCH!=='undefined'&&ARCH[o.archetype]&&typeof sbBadge==='function')s+=sbBadge(o.archetype,50,60);
 if(o.mark&&typeof SB_MARKS!=='undefined'&&SB_MARKS[o.mark]){if(o.mark==='double')s=SB_MARKS[o.mark]+s;else s+=SB_MARKS[o.mark];}
 return s;}
var FIG_BOX=[30,13,40,91];
// ---- seeded stable randomizer ----
function _figRng(seed){var a=seed>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
function _figHash(s){s=String(s);var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function stableHumanFigure(seed,sex){var r=_figRng(_figHash(seed));var pk=function(a){return a[Math.floor(r()*a.length)];};
 var sx=sex==='female'?'f':(sex==='male'?'m':(r()<0.5?'m':'f'));
 return {sex:sx,build:pk(Object.keys(FIG_BUILD[sx])),headShape:pk(Object.keys(FIG_HEADSHAPE)),head:'plain',hair:pk(FIG_HAIR[sx])};}
;
    function randomFigure(seed,opt){opt=opt||{};var r=_figRng(_figHash(String(seed)));var pk=function(a){return a[Math.floor(r()*a.length)];};
      var creature=(opt.creature!==undefined)?opt.creature:(r()<0.32);
      var sex=opt.sex||(r()<0.5?'m':'f');
